<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Carlow Town Walking Tour Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#2d6a4f;--green-dark:#1e4d38;
    --gold:#c97b00;--cream:#fdf8ef;--ink:#1a1208;--ink-soft:#4a3f28;--muted:#7a6e58;
    --white:#fff;--border:rgba(26,18,8,.1);
    --font-display:'Playfair Display',Georgia,serif;
    --font-body:'DM Sans',sans-serif;
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-body);background:var(--cream);color:var(--ink);font-size:15px;}
  .layout{display:grid;grid-template-columns:1fr 300px;height:100vh;overflow:hidden;}
  #map{width:100%;height:100%;}
  .sidebar{background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:18px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .sidebar-header h1{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:4px;}
  .sidebar-header p{font-size:12px;color:var(--muted);line-height:1.5;}
  .stop-list{overflow-y:auto;flex:1;padding:10px;}
  .stop-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:4px;border:1px solid transparent;}
  .stop-item:hover{background:rgba(45,106,79,.06);border-color:rgba(45,106,79,.15);}
  .stop-item.active{background:rgba(45,106,79,.1);border-color:rgba(45,106,79,.25);}
  .stop-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px;}
  .stop-text strong{display:block;font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:2px;}
  .stop-text span{font-size:11px;color:var(--muted);line-height:1.4;}
  .info-panel{border-top:1px solid var(--border);padding:16px;flex-shrink:0;background:var(--cream);display:none;}
  .info-panel.visible{display:block;}
  .info-num{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-bottom:4px;}
  .info-name{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:8px;line-height:1.25;}
  .info-desc{font-size:13px;color:var(--ink-soft);line-height:1.65;}
  .info-close{float:right;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-family:var(--font-body);}
  .leaflet-tooltip{font-family:var(--font-body);font-size:12px;font-weight:600;}
  @media(max-width:640px){
    .layout{grid-template-columns:1fr;grid-template-rows:55vh 1fr;height:auto;min-height:100vh;}
    #map{height:100%;}
    .sidebar{border-left:none;border-top:1px solid var(--border);max-height:45vh;}
  }
</style>
</head>
<body>
<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Carlow Town Walking Tour</h1>
      <p>12 stops · 90 minutes · Fully accredited guide<br>Click any stop to learn more</p>
    </div>
    <div class="stop-list" id="stop-list"></div>
    <div class="info-panel" id="info-panel">
      <button class="info-close" onclick="closeInfo()">✕ Close</button>
      <div class="info-num" id="info-num"></div>
      <div class="info-name" id="info-name"></div>
      <div class="info-desc" id="info-desc"></div>
    </div>
  </div>
</div>
<script>
const stops = [
  {
    num:1, name:"Cathedral of the Assumption",
    lat:52.8407, lng:-6.9228,
    icon:"⛪", color:"#1e4d38",
    tag:"Architecture & faith",
    desc:"The magnificent Cathedral dominates the Carlow skyline. Look closely at the pulpit — it has a story most visitors walk straight past, and one of the more remarkable hidden histories in any Irish church."
  },
  {
    num:2, name:"Capuchin Friary",
    lat:52.8402, lng:-6.9233,
    icon:"🙏", color:"#1e4d38",
    tag:"Religious history",
    desc:"The Capuchin Friary has a deep connection to Kevin Barry — one of Ireland's most celebrated martyrs — and a history stretching back centuries in Carlow town."
  },
  {
    num:3, name:"Carlow Courthouse",
    lat:52.8403, lng:-6.9237,
    icon:"⚖️", color:"#1a3a6e",
    tag:"Architecture & law",
    desc:"One of the finest courthouse buildings in Ireland, designed by William Vitruvius Morrison. Grand, imposing and full of stories from Carlow's legal history — including some very colourful trials."
  },
  {
    num:4, name:"St Dymphna's",
    lat:52.8418, lng:-6.9228,
    icon:"✝️", color:"#1e4d38",
    tag:"Hidden history",
    desc:"St Dymphna — patron saint of mental health — has a remarkable Carlow connection. The site tells a story most people in the county don't know, and one that resonates far beyond the town."
  },
  {
    num:5, name:"Carlow County Museum",
    lat:52.8355, lng:-6.9218,
    icon:"🏛️", color:"#5a3e28",
    tag:"Museum",
    desc:"One of the best county museums in Ireland — punching well above its weight with archaeology, local history and stories that most guidebooks miss entirely. Better than you'd expect."
  },
  {
    num:6, name:"Lucinda Sly Execution Site",
    lat:52.8365, lng:-6.9275,
    icon:"🔪", color:"#5a1a1a",
    tag:"Dark history",
    desc:"This is the stop that silences people. Lucinda Sly was one of the most notorious criminals in 18th-century Ireland — and she was executed right here in Carlow town. The story will stay with you."
  },
  {
    num:7, name:"The Haymarket",
    lat:52.8372, lng:-6.9285,
    icon:"🛒", color:"#5a3e00",
    tag:"Old Carlow",
    desc:"The old market heart of Carlow town. This is where traders gathered, commerce happened and the town came alive — the stories of this area run deep into Carlow's social history."
  },
  {
    num:8, name:"Town Hall",
    lat:52.8378, lng:-6.9292,
    icon:"🏛️", color:"#1a3a6e",
    tag:"Civic history",
    desc:"The Town Hall building and the surrounding streetscape tell the story of how Carlow grew and changed across the centuries — from medieval market town to modern county capital."
  },
  {
    num:9, name:"Carlow Castle",
    lat:52.8368, lng:-6.9322,
    icon:"🏰", color:"#3a2800",
    tag:"Medieval history",
    desc:"A magnificent 13th-century Norman fortress that survived 600 years of war — only to be blown up in 1814 by a doctor with gunpowder who was trying to build a lunatic asylum. One historian called him 'a ninny-pated physician'. Only the western wall and two towers remain."
  },
  {
    num:10, name:"Wellington Bridge",
    lat:52.8362, lng:-6.9342,
    icon:"🌉", color:"#1a3a6e",
    tag:"River Barrow",
    desc:"Named after the Duke of Wellington, this bridge over the River Barrow has been a strategic crossing point for centuries. A brilliant vantage point for the castle ruins and the Barrow beyond."
  },
  {
    num:11, name:"Poor Clares Monastery",
    lat:52.8355, lng:-6.9358,
    icon:"🙏", color:"#1e4d38",
    tag:"Religious history",
    desc:"The Poor Clares have been part of Carlow's story for generations. Their presence in the town is one of the quieter but more moving chapters in the county's history."
  },
  {
    num:12, name:"Corcoran's Bar",
    lat:52.8358, lng:-6.9348,
    icon:"🍺", color:"#7a4a00",
    tag:"Est. 1768 — oldest bar in Carlow",
    desc:"Established 1768 — Carlow's oldest original bar. Victorian hand-carved mahogany and ebony, old-world atmosphere and a pint of Carlow's own O'Hara's craft beer. The perfect ending to 90 minutes of history."
  },
];

let map, markers=[], activeIdx=null;

function makeIcon(stop, active){
  const bg = stop.color;
  const scale = active ? 'scale(1.3)' : 'scale(1)';
  const shadow = active ? '0 4px 14px rgba(0,0,0,.45)' : '0 2px 8px rgba(0,0,0,.3)';
  return L.divIcon({
    className:'',
    html:`<div style="position:relative;width:42px;height:48px;transform:${scale};transition:transform .15s;">
      <div style="width:42px;height:42px;border-radius:50%;background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;border:2.5px solid #fff;box-shadow:${shadow};">
        <span style="font-size:16px;line-height:1;">${stop.icon}</span>
        <span style="font-size:9px;font-weight:700;color:#fff;font-family:'DM Sans',sans-serif;line-height:1;margin-top:1px;">${stop.num}</span>
      </div>
      <div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid ${bg};margin:0 auto;"></div>
    </div>`,
    iconSize:[42,48],iconAnchor:[21,48]
  });
}

function selectStop(i){
  if(activeIdx!==null) markers[activeIdx].setIcon(makeIcon(stops[activeIdx],false));
  activeIdx=i;
  markers[i].setIcon(makeIcon(stops[i],true));
  map.panTo([stops[i].lat,stops[i].lng],{animate:true,duration:.4});
  const s=stops[i];
  document.getElementById('info-num').textContent=`${s.icon}  Stop ${s.num} of 12 · ${s.tag}`;
  document.getElementById('info-name').textContent=s.name;
  document.getElementById('info-desc').textContent=s.desc;
  document.getElementById('info-panel').className='info-panel visible';
  document.querySelectorAll('.stop-item').forEach((el,idx)=>{
    el.className='stop-item'+(idx===i?' active':'');
  });
  document.querySelectorAll('.stop-item')[i].scrollIntoView({block:'nearest',behavior:'smooth'});
}

function closeInfo(){
  document.getElementById('info-panel').className='info-panel';
  if(activeIdx!==null) markers[activeIdx].setIcon(makeIcon(stops[activeIdx],false));
  activeIdx=null;
  document.querySelectorAll('.stop-item').forEach(el=>el.className='stop-item');
}

map=L.map('map',{zoomControl:true}).setView([52.8380,-6.9285],16);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
  maxZoom:19
}).addTo(map);

const coords=stops.map(s=>[s.lat,s.lng]);
L.polyline(coords,{color:'#2d6a4f',weight:3.5,opacity:.75,dashArray:'8,6'}).addTo(map);

stops.forEach((s,i)=>{
  const m=L.marker([s.lat,s.lng],{icon:makeIcon(s,false)}).addTo(map);
  m.bindTooltip(s.name,{permanent:false,direction:'top',offset:[0,-18]});
  m.on('click',()=>selectStop(i));
  markers.push(m);
});

const list=document.getElementById('stop-list');
stops.forEach((s,i)=>{
  const el=document.createElement('div');
  el.className='stop-item';
  el.innerHTML=`<div class="stop-num" style="background:${s.color};font-size:15px;">${s.icon}</div><div class="stop-text"><strong>${s.name}</strong><span>${s.tag}</span></div>`;
  el.addEventListener('click',()=>selectStop(i));
  list.appendChild(el);
});
</script>
</body>
</html>
